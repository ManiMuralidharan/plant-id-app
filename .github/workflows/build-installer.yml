name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js deprecation

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R and Rtools
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'     # <-- Changed from 4.5.2 to stable 4.4.0
          use-public-rspm: true
          install-r: true
          rtools-version: '44'   # <-- Changed from 45 to 44 to match R 4.4.x

      - name: Install Inno Setup (Optional if using the Portable script instead of RInno)
        run: |
          choco install innosetup -y
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH
        shell: powershell

      - name: Build the portable bundle
        shell: Rscript {0}
        run: source("build_portable_bundle.R")

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-bundle
          path: installer_output/**
          if-no-files-found: error
