name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'

      - name: Install Inno Setup (the actual .exe compiler)
        run: choco install innosetup -y
        shell: powershell

      - name: Install R package dependencies
        shell: Rscript {0}
        run: |
          pkgs <- c(
            "shiny", "bslib", "DT", "DBI", "RSQLite", "magick", "base64enc",
            "httr", "jsonlite", "torch", "torchvision", "ggplot2", "plotly",
            "shinycssloaders", "shinytoastr", "digest"
          )
          install.packages(pkgs, repos = "https://cloud.r-project.org")

      - name: Build the installer
        shell: Rscript {0}
        run: source("build_windows_installer.R")

      - name: Upload installer as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output/**
          if-no-files-found: error
