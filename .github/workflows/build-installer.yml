# .github/workflows/build-installer.yml
#
# Builds a portable Windows distribution (no installer wizard) by copying
# the runner's own R, installing packages into that copy, and zipping the
# result. Replaces the earlier RInno-based approach, which kept surfacing
# bugs from an unmaintained dependency (Maintainer: ORPHANED) one at a time.

name: Build Windows Portable Bundle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'

      - name: Build the portable bundle
        shell: Rscript {0}
        run: source("build_portable_bundle.R")

      - name: Upload bundle as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-bundle
          path: installer_output/**
          if-no-files-found: error
