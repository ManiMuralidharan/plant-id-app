name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R and Rtools
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          use-public-rspm: true
          install-r: true
          rtools-version: '2024'

      - name: Install Inno Setup
        run: |
          choco install innosetup -y
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH
        shell: powershell

      - name: Install R package dependencies (only those needed for build)
        shell: Rscript {0}
        run: |
          # The script itself installs RInno, but we pre‑install other heavy deps
          install.packages(c(
            "shiny", "bslib", "DT", "DBI", "RSQLite", "magick", "base64enc",
            "httr", "jsonlite", "torch", "torchvision", "ggplot2", "plotly",
            "shinycssloaders", "shinytoastr", "digest"
          ), repos = "https://cloud.r-project.org")

      - name: Build the installer
        shell: Rscript {0}
        run: source("build_windows_installer.R")

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output/**
          if-no-files-found: error
